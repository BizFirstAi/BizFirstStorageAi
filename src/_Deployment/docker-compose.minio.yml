version: '3.8'

services:
  # ==================== PRIMARY STORAGE ====================
  bizfirst-primary:
    image: minio/minio:latest
    container_name: bizfirst-primary
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - network_QA
      - network_Demo
    volumes:
      - bizfirst-primary-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      MINIO_SITE_NAME: bizfirst-primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bizfirst-primary-init:
    image: minio/mc:latest
    container_name: bizfirst-primary-init
    depends_on:
      bizfirst-primary:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set primary http://bizfirst-primary:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing primary/bizfirst-files;
      mc anonymous set none primary/bizfirst-files;
      mc version enable primary/bizfirst-files;
      echo 'Primary bucket ready: versioning enabled';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    restart: "no"

  # ==================== BACKUP SCHEDULER ====================
  bizfirst-backup-scheduler:
    image: mcuadros/ofelia:latest
    container_name: bizfirst-backup-scheduler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ofelia.ini:/etc/ofelia/config.ini:ro
    restart: unless-stopped

  # ==================== MINIO BACKUP SERVICE ====================
  bizfirst-backup-minio:
    image: alpine:latest
    container_name: bizfirst-backup-minio
    volumes_from:
      - bizfirst-primary
    volumes:
      - bizfirst-backup-data:/backups
    environment:
      RESTIC_REPOSITORY: s3:http://${MINIO_REPLICA_ENDPOINT:-backup-server}:9000/backups-minio
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-bizfirst123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-bizfirst}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      RESTIC_S3_USE_PATH_STYLE: "true"
    labels:
      ofelia: "enabled"
      ofelia.monitored: "true"
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache restic curl bash;
      restic init || true;
      TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
      echo '[$$TIMESTAMP] MinIO backup started';
      restic backup /data --tag minio-primary 2>&1 && \
      restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune 2>&1 && \
      echo '[✓] MinIO backup complete' || echo '[✗] MinIO backup failed'
      "
    restart: unless-stopped

  # ==================== SQL SERVER BACKUP SERVICE ====================
  bizfirst-backup-sqlserver:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: bizfirst-backup-sqlserver
    volumes:
      - bizfirst-backup-data:/backups
    environment:
      RESTIC_REPOSITORY: s3:http://${MINIO_REPLICA_ENDPOINT:-backup-server}:9000/backups-sqlserver
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-bizfirst123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-bizfirst}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      RESTIC_S3_USE_PATH_STYLE: "true"
      SQLSERVER_HOST: ${SQLSERVER_HOST:-sqlserver}
      SQLSERVER_PORT: ${SQLSERVER_PORT:-1433}
      SQLSERVER_SA_PASSWORD: ${SQLSERVER_PASSWORD:-SqlServer@123}
      SQLSERVER_DB_NAME: ${SQLSERVER_DB_NAME:-master}
    labels:
      ofelia: "enabled"
      ofelia.monitored: "true"
    entrypoint: >
      /bin/bash -c "
      apt-get update && apt-get install -y restic curl 2>/dev/null;
      restic init || true;
      TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
      BACKUP_FILE=/tmp/sqlserver_$${TIMESTAMP}.bak;
      echo '[$$TIMESTAMP] SQL Server backup started';
      /opt/mssql-tools/bin/sqlcmd -S $${SQLSERVER_HOST} -U SA -P '$${SQLSERVER_SA_PASSWORD}' -Q \"BACKUP DATABASE [$${SQLSERVER_DB_NAME}] TO DISK='$$BACKUP_FILE'\" && \
      restic backup $$BACKUP_FILE --tag sqlserver 2>&1 && \
      restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune 2>&1 && \
      rm -f $$BACKUP_FILE && \
      echo '[✓] SQL Server backup complete' || echo '[✗] SQL Server backup failed'
      "
    restart: unless-stopped

  # ==================== POSTGRESQL BACKUP SERVICE ====================
  bizfirst-backup-postgresql:
    image: alpine:latest
    container_name: bizfirst-backup-postgresql
    volumes:
      - bizfirst-backup-data:/backups
    environment:
      RESTIC_REPOSITORY: s3:http://${MINIO_REPLICA_ENDPOINT:-backup-server}:9000/backups-postgresql
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-bizfirst123}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-bizfirst}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      RESTIC_S3_USE_PATH_STYLE: "true"
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME:-postgres}
    labels:
      ofelia: "enabled"
      ofelia.monitored: "true"
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache restic postgresql-client curl bash;
      restic init || true;
      TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
      BACKUP_FILE=/tmp/postgres_$${TIMESTAMP}.sql.gz;
      echo '[$$TIMESTAMP] PostgreSQL backup started';
      export PGPASSWORD=$${POSTGRES_PASSWORD};
      pg_dump -h $${POSTGRES_HOST} -p $${POSTGRES_PORT} -U $${POSTGRES_USER} $${POSTGRES_DB_NAME} | gzip > $$BACKUP_FILE && \
      restic backup $$BACKUP_FILE --tag postgresql 2>&1 && \
      restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune 2>&1 && \
      rm -f $$BACKUP_FILE && \
      echo '[✓] PostgreSQL backup complete' || echo '[✗] PostgreSQL backup failed'
      "
    restart: unless-stopped

  # ==================== HOT STANDBY ====================
  bizfirst-hotstandby:
    image: minio/minio:latest
    container_name: bizfirst-hotstandby
    command: server /data --console-address ":9011"
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - bizfirst-hotstandby-data:/data
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      MINIO_SITE_NAME: bizfirst-hotstandby
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bizfirst-hotstandby-setup:
    image: minio/mc:latest
    container_name: bizfirst-hotstandby-setup
    depends_on:
      bizfirst-hotstandby:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set primary http://bizfirst-primary:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc alias set standby http://bizfirst-hotstandby:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc admin replicate add primary standby;
      echo 'Site replication configured: primary -> hotstandby';
      "
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  # ==================== RESILIENCY WATCHDOG ====================
  bizfirst-watchdog:
    image: alpine:latest
    container_name: bizfirst-watchdog
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl;
      while true; do
        TIMESTAMP=$$(date -u '+%Y-%m-%dT%H:%M:%SZ');

        PRIMARY=$$(curl -sf --max-time 5 http://bizfirst-primary:9000/minio/health/live && echo OK || echo FAIL);
        STANDBY=$$(curl -sf --max-time 5 http://bizfirst-hotstandby:9000/minio/health/live && echo OK || echo FAIL);

        echo \"$$TIMESTAMP [PRIMARY] $$PRIMARY\";
        echo \"$$TIMESTAMP [HOTSTANDBY] $$STANDBY\";

        if [ \"$$PRIMARY\" = 'FAIL' ] && [ \"$$STANDBY\" = 'OK' ]; then
          echo \"$$TIMESTAMP [ALERT] Primary is DOWN. HotStandby is UP. Manual failover required.\";
        fi;

        sleep 30;
      done
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==================== ARCHIVAL SERVICE ====================
  bizfirst-archival:
    image: minio/minio:latest
    container_name: bizfirst-archival
    command: server /data --console-address ":9021"
    ports:
      - "9020:9000"
      - "9021:9021"
    volumes:
      - bizfirst-archival-data:/data
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      MINIO_SITE_NAME: bizfirst-archival
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bizfirst-archival-init:
    image: minio/mc:latest
    container_name: bizfirst-archival-init
    depends_on:
      bizfirst-archival:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set archival http://bizfirst-archival:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing archival/bizfirst-archive;
      mc anonymous set none archival/bizfirst-archive;
      mc ilm rule add --expire-days 3650 archival/bizfirst-archive || true;
      echo 'Archival bucket ready: 10-year expiry (ILM tier from primary configured by replication-setup)';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    restart: "no"

  # ==================== COMPLIANCE & RETENTION ====================
  bizfirst-compliance:
    image: minio/minio:latest
    container_name: bizfirst-compliance
    command: server /data --console-address ":9031"
    ports:
      - "9030:9000"
      - "9031:9031"
    volumes:
      - bizfirst-compliance-data:/data
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      MINIO_SITE_NAME: bizfirst-compliance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bizfirst-compliance-init:
    image: minio/mc:latest
    container_name: bizfirst-compliance-init
    depends_on:
      bizfirst-compliance:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set compliance http://bizfirst-compliance:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing --with-lock compliance/bizfirst-legal-hold;
      mc mb --ignore-existing --with-lock compliance/bizfirst-worm;
      mc retention set --default COMPLIANCE 7y compliance/bizfirst-worm;
      mc retention set --default GOVERNANCE 1y compliance/bizfirst-legal-hold;
      echo 'WORM buckets ready: legal-hold (GOVERNANCE 1y), worm (COMPLIANCE 7y)';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    restart: "no"

  # ==================== POINT-IN-TIME RESTORE ====================
  bizfirst-pitr:
    image: minio/minio:latest
    container_name: bizfirst-pitr
    command: server /data --console-address ":9041"
    ports:
      - "9040:9000"
      - "9041:9041"
    volumes:
      - bizfirst-pitr-data:/data
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
      MINIO_SITE_NAME: bizfirst-pitr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  bizfirst-pitr-init:
    image: minio/mc:latest
    container_name: bizfirst-pitr-init
    depends_on:
      bizfirst-pitr:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set pitr http://bizfirst-pitr:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing pitr/bizfirst-versioned;
      mc version enable pitr/bizfirst-versioned;
      echo 'PITR bucket ready: versioning enabled on bizfirst-versioned';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    restart: "no"

  bizfirst-pitr-snapshotter:
    image: restic/restic:latest
    container_name: bizfirst-pitr-snapshotter
    volumes_from:
      - bizfirst-pitr
    volumes:
      - bizfirst-pitr-snapshots:/snapshots
    environment:
      RESTIC_REPOSITORY: /snapshots
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-bizfirst123}
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # ==================== REPLICATION SETUP ====================
  bizfirst-replication-setup:
    image: minio/mc:latest
    container_name: bizfirst-replication-setup
    depends_on:
      bizfirst-primary:
        condition: service_healthy
      bizfirst-archival:
        condition: service_healthy
      bizfirst-compliance:
        condition: service_healthy
      bizfirst-pitr:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set primary http://bizfirst-primary:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc alias set archival http://bizfirst-archival:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc alias set compliance http://bizfirst-compliance:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc alias set pitr http://bizfirst-pitr:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;

      mc ilm tier add minio primary ARCHIVAL-TIER --endpoint http://bizfirst-archival:9000 --access-key $$MINIO_ROOT_USER --secret-key $$MINIO_ROOT_PASSWORD --bucket bizfirst-archive 2>/dev/null || true;
      mc ilm rule add --transition-days 90 --transition-tier ARCHIVAL-TIER primary/bizfirst-files 2>/dev/null || true;

      mc replicate add --remote-bucket http://$$MINIO_ROOT_USER:$$MINIO_ROOT_PASSWORD@bizfirst-compliance:9000/bizfirst-worm --replicate delete-marker,existing-objects,metadata-sync --priority 10 primary/bizfirst-files 2>/dev/null || true;

      mc replicate add --remote-bucket http://$$MINIO_ROOT_USER:$$MINIO_ROOT_PASSWORD@bizfirst-pitr:9000/bizfirst-versioned --replicate existing-objects,metadata-sync --priority 20 primary/bizfirst-files 2>/dev/null || true;

      echo 'Replication ready: primary -> archival (ILM 90d), compliance (WORM mirror), pitr (versioned no-delete)';
      "
    networks:
      - network_QA
      - network_Demo
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bizfirst}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bizfirst123}
    restart: "no"

networks:
  network_QA:
    external: true
  network_Demo:
    external: true
volumes:
  bizfirst-primary-data:
    name: bizfirst-primary-data
  bizfirst-backup-data:
    name: bizfirst-backup-data
  bizfirst-hotstandby-data:
    name: bizfirst-hotstandby-data
  bizfirst-archival-data:
    name: bizfirst-archival-data
  bizfirst-compliance-data:
    name: bizfirst-compliance-data
  bizfirst-pitr-data:
    name: bizfirst-pitr-data
  bizfirst-pitr-snapshots:
    name: bizfirst-pitr-snapshots
  db-dumps:
    name: db-dumps
