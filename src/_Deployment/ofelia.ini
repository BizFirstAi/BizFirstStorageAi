[job-exec "backup-minio"]
schedule  = 0 2 * * *
container = bizfirst-backup-minio
command   = /bin/sh -c "restic init 2>/dev/null || true && restic backup /data --tag minio-primary && restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune"

[job-exec "backup-sqlserver"]
schedule  = 10 2 * * *
container = bizfirst-backup-sqlserver
command   = /bin/bash -c "restic init 2>/dev/null || true && BACKUP_FILE=/tmp/sqlserver_$(date +%Y%m%d_%H%M%S).bak && /opt/mssql-tools/bin/sqlcmd -S $SQLSERVER_HOST -U SA -P \"$SQLSERVER_SA_PASSWORD\" -Q \"BACKUP DATABASE [$SQLSERVER_DB_NAME] TO DISK='$BACKUP_FILE'\" && restic backup $BACKUP_FILE --tag sqlserver && restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune && rm -f $BACKUP_FILE"

[job-exec "backup-postgresql"]
schedule  = 20 2 * * *
container = bizfirst-backup-postgresql
command   = /bin/sh -c "restic init 2>/dev/null || true && BACKUP_FILE=/tmp/postgres_$(date +%Y%m%d_%H%M%S).sql.gz && PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h $POSTGRES_HOST -p $POSTGRES_PORT -U $POSTGRES_USER $POSTGRES_DB_NAME | gzip > $BACKUP_FILE && restic backup $BACKUP_FILE --tag postgresql && restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune && rm -f $BACKUP_FILE"
