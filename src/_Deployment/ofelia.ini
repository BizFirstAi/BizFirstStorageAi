[job-exec "hourly-backup"]
schedule  = @hourly
container = bizfirst-backup-runner
command   = restic backup /data --tag bizfirst-primary

[job-exec "daily-retention"]
schedule  = 0 2 * * *
container = bizfirst-backup-runner
command   = restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 12 --prune
